<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Carrito de compra de Lexi.">
  <meta name="robots" content="index,follow">
  <title>Lexi | Carrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="#mainContent" class="skip-link">Saltar al contenido</a>

<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html" aria-label="Ir a inicio Lexi">
      <img src="icons/logo.svg" alt="Logo Lexi">
    </a>
    <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="mainNav">
      <i class="bi bi-list"></i>
    </button>
    <nav class="nav-left" id="mainNav">
      <a href="index.html">Inicio</a>
      <a href="ejercicios.html">Ejercicios</a>
      <a href="producto.html">Producto</a>
      <a href="busqueda.html">Busqueda</a>
      <a href="contacto.html">Contacto</a>
      <a href="info.html">Info</a>
    </nav>
  </div>

  <div class="header-right">
    <button class="icon-btn" type="button" aria-label="Progreso">
      <img src="icons/progress.svg" alt="Progreso" class="icono-oscilante">
    </button>
    <button class="icon-btn" type="button" aria-label="Idioma ingles">
      <img src="icons/united_kingdom_flag.svg" alt="Bandera de idioma" class="icono-parpadeante">
    </button>
    <button class="icon-btn" type="button" aria-label="Perfil">
      <img src="icons/profile.svg" alt="Perfil">
    </button>
    <button class="icon-btn cart-trigger" type="button" data-cart-trigger aria-label="Abrir carrito">
      <i class="bi bi-cart3"></i>
      <span class="cart-count-badge" data-cart-count>0</span>
    </button>
  </div>
</header>

<main id="mainContent" class="page-main container section-space" data-cart-page>
  <h1 class="mb-4">Carrito</h1>

  <div class="table-responsive">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Subtotal</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="cartItems"></tbody>
      <tfoot>
        <tr>
          <th colspan="3" class="text-end">Total</th>
          <th id="cartTotal">0 EUR</th>
          <th></th>
        </tr>
      </tfoot>
    </table>
  </div>

  <button id="clearCart" class="btn btn-outline-danger" type="button">Vaciar carrito</button>
</main>

<div class="modal fade" id="confirmRemoveModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="h5 mb-0">Confirmar eliminacion</h2>
        <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">Quieres eliminar este producto del carrito?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-danger" id="confirmRemoveBtn" type="button">Eliminar</button>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>Lexi Â© 2026 Â· <a href="info.html">Informacion</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
