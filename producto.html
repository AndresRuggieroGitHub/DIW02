<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ficha de producto de Lexi con curso de ingles y anadir al carrito.">
  <meta name="robots" content="index,follow">
  <title>Lexi | Producto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="#mainContent" class="skip-link">Saltar al contenido</a>

<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html" aria-label="Ir a inicio Lexi">
      <img src="icons/logo.svg" alt="Logo Lexi">
    </a>
    <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="mainNav">
      <i class="bi bi-list"></i>
    </button>
    <nav class="nav-left" id="mainNav">
      <a href="index.html">Inicio</a>
      <a href="ejercicios.html">Ejercicios</a>
      <a class="active" href="producto.html">Producto</a>
      <a href="busqueda.html">Busqueda</a>
      <a href="contacto.html">Contacto</a>
      <a href="info.html">Info</a>
    </nav>
  </div>

  <div class="header-right">
    <button class="icon-btn" type="button" aria-label="Progreso">
      <img src="icons/progress.svg" alt="Progreso" class="icono-oscilante">
    </button>
    <button class="icon-btn" type="button" aria-label="Idioma ingles">
      <img src="icons/united_kingdom_flag.svg" alt="Bandera de idioma" class="icono-parpadeante">
    </button>
    <button class="icon-btn" type="button" aria-label="Perfil">
      <img src="icons/profile.svg" alt="Perfil">
    </button>
    <button class="icon-btn cart-trigger" type="button" data-cart-trigger aria-label="Abrir carrito">
      <i class="bi bi-cart3"></i>
      <span class="cart-count-badge" data-cart-count>0</span>
    </button>
  </div>
</header>

<main id="mainContent" class="page-main container section-space">
  <h1 class="mb-4">Curso de ingles basico</h1>

  <section class="product-grid">
    <article>
      <img class="img-fluid rounded shadow-sm" src="images/reading_medium.webp" alt="Curso de ingles basico Lexi" loading="lazy">
    </article>

    <article class="product-info">
      <p class="product-price">19 EUR</p>
      <ul>
        <li>Duracion: 4 semanas</li>
        <li>Nivel: A1-A2</li>
        <li>Incluye ejercicios de listening y speaking</li>
      </ul>
      <button class="btn btn-success mt-3" type="button" data-add-cart data-id="curso-ingles-basico" data-name="Curso ingles basico" data-price="19">Anadir al carrito</button>
    </article>
  </section>
</main>

<footer class="footer">
  <p>Lexi &copy; 2026 &middot; <a href="info.html">Informacion</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
