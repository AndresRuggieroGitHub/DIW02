<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Busqueda de cursos y ejercicios en Lexi.">
  <meta name="robots" content="index,follow">
  <title>Lexi | Busqueda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="#mainContent" class="skip-link">Saltar al contenido</a>

<header class="header">
  <div class="header-left">
    <a class="logo" href="index.html" aria-label="Ir a inicio Lexi">
      <img src="icons/logo.svg" alt="Logo Lexi">
    </a>
    <button class="nav-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="mainNav">
      <i class="bi bi-list"></i>
    </button>
    <nav class="nav-left" id="mainNav">
      <a href="index.html">Inicio</a>
      <a href="ejercicios.html">Ejercicios</a>
      <a href="producto.html">Producto</a>
      <a class="active" href="busqueda.html">Busqueda</a>
      <a href="contacto.html">Contacto</a>
      <a href="info.html">Info</a>
    </nav>
  </div>

  <div class="header-right">
    <button class="icon-btn" type="button" aria-label="Progreso">
      <img src="icons/progress.svg" alt="Progreso" class="icono-oscilante">
    </button>
    <button class="icon-btn" type="button" aria-label="Idioma ingles">
      <img src="icons/united_kingdom_flag.svg" alt="Bandera de idioma" class="icono-parpadeante">
    </button>
    <button class="icon-btn" type="button" aria-label="Perfil">
      <img src="icons/profile.svg" alt="Perfil">
    </button>
    <button class="icon-btn cart-trigger" type="button" data-cart-trigger aria-label="Abrir carrito">
      <i class="bi bi-cart3"></i>
      <span class="cart-count-badge" data-cart-count>0</span>
    </button>
  </div>
</header>

<main id="mainContent" class="page-main container section-space">
  <h1 class="mb-4">Resultados de busqueda</h1>

  <div class="mb-4">
    <label for="searchInput" class="form-label">Buscar cursos</label>
    <input id="searchInput" class="form-control" type="search" placeholder="Ejemplo: speaking, reading...">
  </div>

  <section class="result-grid">
    <article class="result-card">
      <img src="images/listening_small.webp" alt="Curso de listening" loading="lazy">
      <h2 class="h5">Pack listening</h2>
      <p>12 EUR</p>
      <button class="btn btn-success" type="button" data-add-cart data-id="pack-listening" data-name="Pack listening" data-price="12">Anadir</button>
    </article>

    <article class="result-card">
      <img src="images/reading_small.webp" alt="Curso de reading" loading="lazy">
      <h2 class="h5">Pack reading</h2>
      <p>10 EUR</p>
      <button class="btn btn-success" type="button" data-add-cart data-id="pack-reading" data-name="Pack reading" data-price="10">Anadir</button>
    </article>

    <article class="result-card">
      <img src="images/speaking_small.webp" alt="Curso de speaking" loading="lazy">
      <h2 class="h5">Pack speaking</h2>
      <p>14 EUR</p>
      <button class="btn btn-success" type="button" data-add-cart data-id="pack-speaking" data-name="Pack speaking" data-price="14">Anadir</button>
    </article>

    <article class="result-card">
      <img src="images/writing_small.webp" alt="Curso de writing" loading="lazy">
      <h2 class="h5">Pack writing</h2>
      <p>11 EUR</p>
      <button class="btn btn-success" type="button" data-add-cart data-id="pack-writing" data-name="Pack writing" data-price="11">Anadir</button>
    </article>
  </section>
</main>

<footer class="footer">
  <p>Lexi Â© 2026 Â· <a href="info.html">Informacion</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
